<table class="table table-hover" hx-on::after-request="if(event.detail.successful)getModal().toggle()" data-bs-target="#baseModal" hx-target="#modalContent">
    <thead>
        <tr>
            <th class="col-md-2">Role</th>
            <th>Description</th>
            <th>
                <button class="btn btn-table" hx-get="{{ url_for('role', project_id=context.project_id) }}" title="Create New Role">
                    <i class="bi bi-plus-circle-fill"></i>
                </button>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for role in context.roles %}
        <tr title="id:{{ role['id'] }}">
            <td>{{ role['name'] }}</td>
            <td>{{ role['description'] }}</td>
            <td>
                <button class="btn btn-table pe-3" hx-get="{{ url_for('role_form', role_id=role.id) }}">
                    <i class="bi bi-pen-fill"></i>
                </button>
                <button class="btn btn-table" hx-confirm="Delete role {{ role.name|forceescape }}?" hx-delete="{{ url_for('role_delete', role_id=role.id) }}">
                    <i class="bi bi-trash3"></i>
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
