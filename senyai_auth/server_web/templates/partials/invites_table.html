<table class="table table-hover">
    <thead>
        <tr>
            <th>Display name</th>
            <th class="col"></th>
            <th>
                <button class="btn btn-table" hx-get="{{ url_for('invite', project_id=project_id, project_name=project_name) }}"
                    hx-trigger="click" hx-target="#modalContent" data-bs-toggle="modal" data-bs-target="#baseModal">
                    <i class="bi bi-plus-circle-fill"></i>
                </button>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for invite in invites %}
        <tr>
            <td>{{ invite['display_name'] }}</td>
            <td class="text-center">
                {% if invite['accepted_id'] %}
                <i class="bi bi-envelope-check fs-2 text-success"></i>
                {% else %}
                <a href="register/{{ invite.url_key }}"><i class="bi bi-envelope fs-2"></i></a>
                {% endif %}
            </td>
            <td>{% if not invite['accepted_id'] %}
                <button class="btn btn-table" hx-confirm="Delete invitation for {{ invite.display_name }}?" hx-delete="invite/{{ invite.url_key }}">
                    <i class="bi bi-trash3"></i>
                </button>
            {% endif %}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
