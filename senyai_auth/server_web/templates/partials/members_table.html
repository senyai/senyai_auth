<table class="table table-hover" hx-on::after-request="getModal().toggle()" data-bs-target="#baseModal" hx-target="#modalContent">
    <thead>
        <tr>
            <th class="col-2">Name</th>
            {% for role in context.roles %}
            <th class="text-center">{{ role.name }}</th>
            {% endfor %}
            <th>
                <button class="btn btn-table" hx-get="{{ url_for('add_users', project_id=context.project_id) }}" title="Add user from other projects">
                    <i class="bi bi-plus-circle-fill"></i>
                </button>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for member in context.members %}
        <tr>
            <td title="{{ member.username }}:{{ member.id }}">{{ member.display_name }}</td>
            {% for role in context.roles %}
            <td class="text-center">
                {% if member.id in role.users %}
                <i class="bi bi-check-lg"></i>
                {% endif %}
            </td>
            {% endfor %}
            <td hx-vals='{"user_id": {{ member.id }}}'>
                <button class="btn btn-table pe-3 edit-btn" hx-get="{{ url_for('get_manage_user_roles_form', project_id=context.project_id) }}">
                    <i class="bi bi-pen-fill"></i>
                </button>
                <button class="btn btn-table del-btn" hx-confirm="Delete user {{ member.username }}?" hx-delete="{{ url_for('delete_users', project_id=context.project_id) }}">
                    <i class="bi bi-trash3"></i>
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
